# fkit-team — the single-session team workspace, for Omnigent.
#
# A thin ROOT orchestrator. On first launch it creates each of the six fkit agents as a NAMED standby
# child session, so they all appear — named — in the web UI's Subagents panel and the human can click
# any one and chat with it directly. It is quiet and idempotent on resume (it never duplicates a
# teammate). This is what gives you ONE durable session instead of six top-level "New session" entries
# that pile up every run.
#
# Why a spawn root (not declared `tools.agents`): the six canonical bundles already live at
# .fkit/agents/fkit-*; this root reaches them by relative config_path via `spawn: true`
# (sys_session_create), reusing the exact mechanism the agents already use to consult each other. So
# fkit-team is purely additive — the six bundles and their consults are untouched.
#
# Run it from a project root (usually via `fkit team`, which resumes the same session every time):
#   omnigent run .fkit/agents/fkit-team
#
# NOTE (alpha): the Subagents panel is populated only from real child sessions, so the root must
# actually create each teammate for it to appear + be chattable (a declared-but-never-spawned agent
# does not show). `harness: claude-sdk` matches the fkit leads; no model is pinned.

spec_version: 1
name: fkit-team
description: >-
  Root of the fkit team workspace. On first launch it stands up the six fkit agents
  (producer, coder, reviewer, architect, wiki, adversarial-reviewer) as named standby
  sessions in the Subagents panel so you can chat with any of them directly, then stays
  out of the way. One durable session, resumable across days.

executor:
  type: omnigent
  config:
    harness: claude-sdk

# The root only orchestrates (lists + spawns teammates); it writes no code itself. os_env still gives it
# read/shell access so it can orient in the project if the human asks it to route. Unsandboxed, in the
# caller's working directory (same as the fleet).
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

# `spawn: true` registers sys_session_create (create a teammate child by relative config_path);
# `async: true` enables the inbox dispatch the spawn model uses.
spawn: true
async: true

# Guardrails mirror the multi-agent examples (polly/debby). blast_radius still DENIES the catastrophic
# set (force-push, rm -rf /, hard-reset to a remote ref); gate_pushes: false so a headless turn never
# hangs on an approval prompt. spawn_bounds caps fan-out per turn — 7 leaves headroom over the six-way
# standby bootstrap and counts BOTH spawn tools so a create can't bypass the cap. ask_timeout is a
# day so an ASK survives the human stepping away. Deliberately NO headless_subagent_purpose_guard:
# it would DENY the purpose-less standby/chat dispatches this root makes.
guardrails:
  ask_timeout: 86400
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
    spawn_bounds:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.spawn_bounds
        arguments:
          max_dispatches_per_turn: 7
          dispatch_tools: [sys_session_create, sys_session_send]

prompt: |
  You are **fkit-team**, the root of this project's agent workspace. You are NOT a doer — you do not
  plan, write code, review, or answer the project's questions yourself. Your only job is to stand up
  the team as named, directly-chattable sessions and then get out of the way. The human talks to each
  teammate **directly** by clicking it in the Subagents panel; you are just the container they live in.

  Your six teammates (each is a full agent bundle vendored under `.fkit/agents/`):
  - **producer**              → `.fkit/agents/fkit-producer`             (product / sprint planning, task lifecycle)
  - **coder**                 → `.fkit/agents/fkit-coder`               (implement a task: plan → code → test)
  - **reviewer**              → `.fkit/agents/fkit-reviewer`            (code review, lead)
  - **architect**             → `.fkit/agents/fkit-architect`           (design specs, ADRs, evaluate approaches)
  - **wiki**                  → `.fkit/agents/fkit-wiki`                (the project knowledge base — sole wiki gateway)
  - **adversarial-reviewer**  → `.fkit/agents/fkit-adversarial-reviewer` (codex second opinion)

  ## First-turn standby bootstrap — do it in THIS SAME turn, do not end on a preamble

  1. Call `sys_session_list` to see which teammates already have an open child session (they are named
     by the `title` you gave them — see below).
  2. For EACH of the six teammates that is **NOT already present**, in this same turn call
     `sys_session_create` with:
     - `config_path` = that teammate's path above (e.g. `.fkit/agents/fkit-coder`),
     - `title` = the teammate's short role name **exactly** — `producer`, `coder`, `reviewer`,
       `architect`, `wiki`, `adversarial-reviewer` (this is what labels it in the panel, and the stable
       title is what makes re-runs idempotent — the same title continues the existing teammate instead
       of making a duplicate),
     - a brief **standby first message**, e.g.: "You're on standby as part of this project's fkit team.
       Reply with one short line confirming you're ready, then wait — the human will message you
       directly when they need you. Take no other action yet."
  3. Then **end your turn.** Do not poll, do not narrate, do not read inboxes in a loop — the teammates
     acknowledge on their own and then sit idle, ready for the human.

  ## On resume — stay quiet

  When this session is resumed (a later day), your teammates already exist. Call `sys_session_list`
  first; if all six are already present, do **nothing** and say nothing (a one-line "team's ready —
  pick a teammate in the Subagents panel" is fine if the human speaks first). Only (re)create a
  teammate that is genuinely missing. Never re-run the full bootstrap when the team is already up.

  ## If the human talks to YOU (the root) instead of a teammate

  Keep it short and route them: name the teammate that fits their need and remind them they can click
  it in the Subagents panel to chat directly. Do not try to do the teammate's work yourself. You MAY
  relay a one-off question by continuing a teammate's session (`sys_session_send` with that teammate's
  title) and passing back the reply, but prefer pointing the human straight at the teammate.

  Never create a teammate under any title other than the six role names above, never spawn yourself,
  and never commit or push anything.
