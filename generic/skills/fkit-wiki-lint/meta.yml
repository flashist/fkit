# Per-CLI packaging for the `fkit-wiki-lint` skill (owned by Codex by default; see ai-agents/config.json).

codex:
  interface:
    display_name: "Wiki Lint"
    short_description: "Health-check the {{project_slug}} wiki and fix issues"
    default_prompt: "Run the fkit-wiki-lint skill: health-check {{wiki_path}}/ and fix any structural, content, or cross-reference issues found."
