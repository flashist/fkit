# Per-CLI packaging for the `fkit-architect-inspect` skill (unpinned by default).
# The research + interview flow is identical on both models; only the invocation
# syntax and the name of the sub-agent mechanism differ, expressed via per-model
# `vars` substituted into the one source skill.md.

claude:
  user_invocable: true
  description: "Deeply and thoroughly research the current project architecture and write the findings to ai-agents/knowledge-base/architecture.md, asking the user as many clarifying questions as needed (never hesitate to ask). Use for an architecture deep-dive, an onboarding investigation, or documenting how the system fits together. Makes no commits."
  vars:
    agent_tool: "the Task/Agent tool"

codex:
  description: "Use when the user wants Codex to deeply research this project architecture and produce ai-agents/knowledge-base/architecture.md. Trigger for requests like $fkit-architect-inspect, an architecture deep-dive, an onboarding investigation, or documenting how the system fits together. Ask the user as many questions as needed and never hesitate to ask. Makes no commits."
  vars:
    agent_tool: "your sub-agent mechanism"
  interface:
    display_name: "Architect Inspect"
    short_description: "Deep architecture research into architecture.md"
    default_prompt: "Use $fkit-architect-inspect to deeply research this project architecture and write ai-agents/knowledge-base/architecture.md, asking me as many questions as needed."
