# Example project manifest for a fictional project ("Nimbus").
#
# In a real project this file lives at `ai-agents/ai-agents.yml`. It is the single
# place that declares the project's identity and its agent roster. Per-skill model
# routing lives in the sibling `ai-agents/config.json` (edit via `fkit config set`,
# or the `fkit-config` skill), seeded once from this file's `skills:` block below.
# Also used to exercise bootstrap/sync end-to-end.

kit_version: 0.1.0

project:
  name: Nimbus
  slug: nimbus
  owner: Alex
  primary_language: TypeScript
  wiki_path: ai-agents/wiki-vault
  overview: A sample project used to exercise the fkit bootstrap and sync tooling.

# Concrete model ids live here — one place to bump versions.
# `exec` is how each model is called NON-interactively when a stub delegates to it.
# It's OPTIONAL — fkit has sensible built-in defaults; set it only to override them.
models:
  claude:
    cli: claude
    id: claude-opus-4-8
    exec: "claude -p --permission-mode acceptEdits"
  codex:
    cli: codex
    id: gpt-5.5
    exec: "codex exec --sandbox workspace-write"

# The "agents" = your terminal-tab personas. Each names the model it runs on and,
# optionally, an entry_skill that boots it into character and a knowledge file.
roles:
  producer:
    model: claude
    entry_skill: producer
    knowledge: ai-agents/knowledge-base/producer-knowledge-base.md
  coder:
    model: claude
  reviewer:
    model: both
    entry_skill: stateful-review

# Which skills compile to which side. Usually derived from the kit dirs
# (shared/ claude-only/ codex-only/); listed here to make placement explicit
# and overridable per project.
# Each skill is either `shared` (real on every model — for read-only lookups and
# anything where delegation is pointless) or `owned` by one model (real on the
# owner; every OTHER model gets a stub that routes the task to the owner via its
# `exec` command). There is no "hidden from the other model" — every skill is
# available everywhere; non-owners just delegate.
skills:
  shared: [process-review, plan-task, wiki-query, fkit-architect-inspect]
  owned:
    task-done:       claude
    task-cancelled:  claude
    stateful-review: claude
    wiki-ingest:     codex
    wiki-lint:       codex
    wiki-sync:       codex
