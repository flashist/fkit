# ai-agents.yml — SCHEMA / REFERENCE
# ===================================
# Every project that uses fkit has ONE of these at `ai-agents/ai-agents.yml`.
# It is the single source of truth for project identity and the agent roster.
# Editing it + running `sync` regenerates the derived config (per-CLI skills,
# .codex/config.toml model). Per-skill model routing lives in the sibling
# ai-agents/config.json instead (see below).
#
# The parser (bin/compile-skills.mjs) supports: comments, `key: value`, nested maps by
# 2-space indentation, inline flow maps `{ a: b }`, and inline flow lists `[a, b]`.
# Avoid block lists (`- item`) and block scalars (`>` / `|`) — keep values single-line.

kit_version: string     # semver of the kit this project was bootstrapped from; sync checks it

project:
  name: string          # display name → {{project_name}}
  slug: string          # lowercase id → {{project_slug}}
  owner: string         # replaces the hardcoded owner in task/role skills → {{owner}}
  primary_language: string   # → {{primary_language}}
  wiki_path: string     # location of the wiki-vault → {{wiki_path}} (default ai-agents/wiki-vault)
  overview: string      # one-line summary (single line — long form stays in CLAUDE.md/AGENTS.md)

models:                 # concrete model ids → {{claude_id}}, {{codex_id}}
  claude: { cli: string, id: string, exec: string }  # exec optional — how to call this
  codex:  { cli: string, id: string, exec: string }  # model non-interactively (has a default)

roles:                  # the terminal-tab personas; each binds a role → default model
  <role-name>:
    model: claude | codex | both
    entry_skill: string   # optional — the skill that puts the tab into this role
    knowledge: string     # optional — path to this role's project knowledge doc

# There is no `routing:` block anymore (task-type → model). It used to render a
# "Model routing" table into CLAUDE.md/AGENTS.md; that generated section is gone
# entirely. An OLD manifest may still have one — only its `routing.default` is
# still read, once, as a migration seed for ai-agents/config.json's `defaultModel`
# (see `skills:` below for the parallel treatment of the rest of that old shape);
# every other row in an old `routing:` block does nothing at all anymore.

skills:                 # LEGACY — one-time migration seed only, see config.json below
  shared: [names...]        # real skill on EVERY model (each runs it natively)
  owned:                    # real on the owner; a routing STUB on every other model
    <skill-name>: claude | codex   # the skill is still available everywhere — non-owners delegate
  # (legacy `claude_only` / `codex_only` lists are still accepted and read the same way.)
  # All of shared/owned/claude_only/codex_only above is read ONLY the first time
  # ai-agents/config.json doesn't exist yet, to seed its defaultModel + skills. Once
  # config.json exists this block is ignored entirely — per-skill assignment lives
  # there instead: edit directly, via `fkit config set --skill <name> --model …`, or
  # via the `fkit-config` skill.

# ai-agents/config.json — PROJECT-OWNED (JSON, sibling of ai-agents.yml). Auto-created
# once — migrated from routing.default + skills: above. defaultModel/skills (the actual
# user decisions) are never overwritten again once set; `version` is a live bookkeeping
# stamp auto-updated on every bootstrap/sync — not a user decision, and the ONLY place
# this project's compiled-against kit version is recorded (no separate stamp file).
# Authoritative for:
#   version: string                       # fkit VERSION (matches package.json); auto-updated
#   defaultModel: claude | codex          # fallback for any skill without an override
#   skills: { <skill-name>: { model: claude | codex } }
#     # sparse overrides; a skill not listed inherits defaultModel. Legacy `skills.shared`
#     # has no equivalent anymore — it's simply dropped during migration, so a
#     # previously-shared skill just falls through to defaultModel instead.
# Edit defaultModel/skills via `fkit config set --project <dir> …` or the `fkit-config`
# skill; `fkit sync --project <dir>` must run afterward for changes to take effect.

# ai-agents/config-schema.json — KIT-OWNED. Regenerated on every bootstrap/sync, never
# hand-edited. Mirrors every config.json field and, for enum fields, a human-readable
# description of each value (claude/codex) — the mechanical reference so the
# config's meaning is never guessed/interpreted by an LLM.
